<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zelvora — AI Mock Interview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #060610;
    --bg-secondary: #0e0e1a;
    --bg-card: #161625;
    --bg-glass: rgba(22, 22, 37, 0.8);
    --accent: #8b5cf6;
    --accent-glow: rgba(139, 92, 246, 0.3);
    --accent-secondary: #06b6d4;
    --gold: #f59e0b;
    --text-primary: #f0f0f5;
    --text-secondary: #8888a0;
    --text-dim: #55556a;
    --border: rgba(139, 92, 246, 0.15);
    --danger: #ef4444;
    --success: #10b981;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== BG ===== */
  .ambient-bg {
    position: fixed; inset: 0; z-index: 0; overflow: hidden;
  }

  .ambient-bg .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(139,92,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139,92,246,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .ambient-bg .orb {
    position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.1;
    animation: orbFloat 25s ease-in-out infinite;
  }

  .ambient-bg .orb:nth-child(2) {
    width: 500px; height: 500px; background: var(--accent);
    top: -150px; right: -100px;
  }

  .ambient-bg .orb:nth-child(3) {
    width: 400px; height: 400px; background: var(--accent-secondary);
    bottom: -100px; left: -100px; animation-delay: -10s;
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(40px,-30px) scale(1.1); }
    66% { transform: translate(-30px, 40px) scale(0.9); }
  }

  /* ===== APP ===== */
  .app {
    position: relative; z-index: 1;
    max-width: 960px; margin: 0 auto; padding: 20px;
    min-height: 100vh; display: flex; flex-direction: column;
  }

  /* ===== HEADER ===== */
  .header {
    text-align: center; padding: 24px 0 16px;
  }

  .header .logo {
    font-size: 13px; font-weight: 600; letter-spacing: 4px;
    text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
  }

  .header h1 {
    font-size: 26px; font-weight: 800;
    background: linear-gradient(135deg, var(--text-primary), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  /* ===== SETUP SCREEN ===== */
  .setup-screen {
    flex: 1; display: flex; align-items: center; justify-content: center;
  }

  .setup-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 24px; padding: 40px; max-width: 500px; width: 100%;
    text-align: center;
  }

  .setup-card h2 {
    font-size: 22px; margin-bottom: 8px;
  }

  .setup-card .desc {
    color: var(--text-secondary); font-size: 14px; margin-bottom: 28px;
  }

  .field-group {
    text-align: left; margin-bottom: 20px;
  }

  .field-group label {
    display: block; font-size: 13px; color: var(--text-secondary);
    margin-bottom: 8px; font-weight: 500;
  }

  .field-input {
    width: 100%; padding: 12px 16px; background: var(--bg-secondary);
    border: 1px solid var(--border); border-radius: 12px;
    color: var(--text-primary); font-size: 14px; font-family: inherit;
    outline: none; transition: border-color 0.3s;
  }

  .field-input:focus { border-color: var(--accent); }

  .field-input option { background: var(--bg-secondary); color: var(--text-primary); }

  .role-chips {
    display: flex; flex-wrap: wrap; gap: 8px;
  }

  .role-chip {
    padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px;
    background: transparent; color: var(--text-secondary); font-size: 13px;
    cursor: pointer; transition: all 0.3s; font-family: inherit;
  }

  .role-chip:hover, .role-chip.selected {
    border-color: var(--accent); color: var(--accent);
    background: rgba(139,92,246,0.1);
  }

  .start-btn {
    width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), #7c3aed);
    border: none; border-radius: 14px; color: white; font-size: 16px;
    font-weight: 700; cursor: pointer; font-family: inherit;
    transition: transform 0.2s, box-shadow 0.3s; margin-top: 8px;
  }

  .start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(139,92,246,0.3);
  }

  /* ===== INTERVIEW SCREEN ===== */
  .interview-screen {
    flex: 1; display: none; flex-direction: column;
  }

  .interview-screen.active { display: flex; }
  .setup-screen.hidden { display: none; }

  /* ===== INTERVIEWER CARD ===== */
  .interviewer-bar {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 20px; background: var(--bg-glass);
    backdrop-filter: blur(20px); border: 1px solid var(--border);
    border-radius: 16px; margin-bottom: 16px;
  }

  .interviewer-avatar {
    width: 48px; height: 48px; border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }

  .interviewer-info {
    flex: 1;
  }

  .interviewer-name {
    font-weight: 700; font-size: 15px;
  }

  .interviewer-role {
    font-size: 12px; color: var(--text-secondary);
  }

  .interview-meta {
    display: flex; gap: 16px; align-items: center;
  }

  .meta-badge {
    font-size: 11px; padding: 4px 10px; border-radius: 8px;
    font-weight: 600;
  }

  .meta-badge.question {
    background: rgba(139,92,246,0.15); color: var(--accent);
  }

  .meta-badge.time {
    background: rgba(6,182,212,0.15); color: var(--accent-secondary);
  }

  /* ===== STATUS ===== */
  .int-status {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px; font-size: 13px; color: var(--text-secondary);
  }

  .int-status .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-dim); transition: all 0.3s;
  }

  .int-status .dot.listening { background: var(--danger); animation: pulse 1s infinite; }
  .int-status .dot.speaking { background: var(--success); animation: pulse 0.8s infinite; }
  .int-status .dot.thinking { background: var(--gold); animation: pulse 0.5s infinite; }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }

  /* ===== VOICE ORB ===== */
  .int-orb-wrap {
    display: flex; flex-direction: column; align-items: center; padding: 16px 0;
  }

  .int-orb {
    width: 120px; height: 120px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; transition: all 0.4s; position: relative;
    background: radial-gradient(circle at 35% 35%, #3a3560, #1a1540);
  }

  .int-orb.listening {
    background: radial-gradient(circle at 35% 35%, var(--danger), #991b1b);
    animation: breathe 1.5s ease-in-out infinite;
  }

  .int-orb.speaking {
    background: radial-gradient(circle at 35% 35%, var(--success), #065f46);
    animation: breathe 0.8s ease-in-out infinite;
  }

  .int-orb.thinking {
    background: radial-gradient(circle at 35% 35%, var(--gold), #92400e);
    animation: spin 2s linear infinite;
  }

  @keyframes breathe {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .int-orb-label {
    font-size: 13px; color: var(--text-secondary); margin-top: 10px;
  }

  /* ===== WAVEFORM ===== */
  .wave-bar-wrap {
    display: flex; align-items: center; justify-content: center;
    gap: 3px; height: 30px; margin: 10px 0;
  }

  .wave-bar-wrap .b {
    width: 3px; height: 6px; background: var(--accent);
    border-radius: 3px; transition: height 0.1s;
  }

  .wave-bar-wrap.active .b {
    animation: wb 0.5s ease-in-out infinite;
  }

  .wave-bar-wrap .b:nth-child(1) { animation-delay: 0s; }
  .wave-bar-wrap .b:nth-child(2) { animation-delay: 0.08s; }
  .wave-bar-wrap .b:nth-child(3) { animation-delay: 0.16s; }
  .wave-bar-wrap .b:nth-child(4) { animation-delay: 0.24s; }
  .wave-bar-wrap .b:nth-child(5) { animation-delay: 0.32s; }
  .wave-bar-wrap .b:nth-child(6) { animation-delay: 0.24s; }
  .wave-bar-wrap .b:nth-child(7) { animation-delay: 0.16s; }

  @keyframes wb {
    0%,100% { height: 6px; }
    50% { height: 26px; }
  }

  /* ===== TRANSCRIPT ===== */
  .live-t {
    text-align: center; min-height: 20px; font-size: 13px;
    color: var(--text-dim); font-style: italic; padding: 6px;
  }

  /* ===== CHAT ===== */
  .int-chat {
    flex: 1; overflow-y: auto; padding: 8px 0;
    display: flex; flex-direction: column; gap: 10px;
    max-height: 40vh; scroll-behavior: smooth;
  }

  .int-chat::-webkit-scrollbar { width: 3px; }
  .int-chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .int-msg {
    max-width: 85%; padding: 12px 16px; border-radius: 16px;
    font-size: 13px; line-height: 1.6; animation: slideUp 0.3s ease-out;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .int-msg.interviewer {
    align-self: flex-start;
    background: var(--bg-card); border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .int-msg.candidate {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--accent), #7c3aed);
    color: white; border-bottom-right-radius: 4px;
  }

  .int-msg .ts {
    font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 4px; display: block;
  }

  .int-msg.interviewer .ts { color: var(--text-dim); }

  /* ===== INTERVIEW CONTROLS ===== */
  .int-controls {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; padding: 16px 0; flex-wrap: wrap;
  }

  .int-btn {
    padding: 10px 18px; border: 1px solid var(--border);
    border-radius: 12px; background: var(--bg-glass);
    backdrop-filter: blur(10px); color: var(--text-secondary);
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.3s; font-family: inherit;
    display: flex; align-items: center; gap: 6px;
  }

  .int-btn:hover {
    border-color: var(--accent); color: var(--text-primary);
  }

  .int-btn.end {
    border-color: var(--danger); color: var(--danger);
  }

  .int-btn.end:hover {
    background: rgba(239,68,68,0.1);
  }

  /* ===== SCORE CARD ===== */
  .score-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
    display: none; align-items: center; justify-content: center;
    padding: 20px;
  }

  .score-overlay.open { display: flex; }

  .score-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 24px; padding: 36px; max-width: 480px; width: 100%;
    text-align: center; animation: slideUp 0.4s ease-out;
  }

  .score-card h2 { font-size: 24px; margin-bottom: 6px; }

  .score-ring {
    width: 100px; height: 100px; margin: 20px auto;
    position: relative;
  }

  .score-ring svg {
    width: 100%; height: 100%; transform: rotate(-90deg);
  }

  .score-ring .bg {
    fill: none; stroke: var(--border); stroke-width: 8;
  }

  .score-ring .fg {
    fill: none; stroke: var(--accent); stroke-width: 8;
    stroke-linecap: round; transition: stroke-dashoffset 1s ease-out;
  }

  .score-ring .val {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 800; color: var(--accent);
  }

  .score-metrics {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    margin: 20px 0; text-align: left;
  }

  .score-metric {
    padding: 12px; background: var(--bg-secondary);
    border-radius: 12px; border: 1px solid var(--border);
  }

  .score-metric .label {
    font-size: 11px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1px;
  }

  .score-metric .value {
    font-size: 18px; font-weight: 700; margin-top: 4px;
  }

  .score-feedback {
    text-align: left; font-size: 13px; color: var(--text-secondary);
    line-height: 1.7; margin: 16px 0; padding: 16px;
    background: var(--bg-secondary); border-radius: 12px;
    border: 1px solid var(--border); max-height: 200px; overflow-y: auto;
  }

  .score-close {
    padding: 12px 32px; background: var(--accent); border: none;
    border-radius: 12px; color: white; font-size: 14px;
    font-weight: 600; cursor: pointer; font-family: inherit;
    transition: transform 0.2s;
  }

  .score-close:hover { transform: scale(1.05); }

  /* ===== VOICE SELECT ===== */
  .voice-sel {
    display: flex; align-items: center; gap: 8px;
    justify-content: center; margin-bottom: 12px; flex-wrap: wrap;
  }

  .v-chip {
    padding: 5px 12px; border: 1px solid var(--border); border-radius: 16px;
    font-size: 11px; color: var(--text-secondary); cursor: pointer;
    transition: all 0.3s; background: transparent; font-family: inherit;
  }

  .v-chip:hover, .v-chip.sel {
    border-color: var(--accent); color: var(--accent);
    background: rgba(139,92,246,0.1);
  }

  @media (max-width: 600px) {
    .app { padding: 12px; }
    .setup-card { padding: 24px; }
    .int-orb { width: 100px; height: 100px; font-size: 32px; }
    .int-chat { max-height: 30vh; }
    .interviewer-bar { flex-direction: column; text-align: center; }
    .score-metrics { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="ambient-bg">
  <div class="grid"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">✦ ZELVORA</div>
    <h1>AI Mock Interview</h1>
  </div>

  <!-- ===== SETUP SCREEN ===== -->
  <div class="setup-screen" id="setupScreen">
    <div class="setup-card">
      <h2>🎯 Set Up Your Interview</h2>
      <p class="desc">Realistic AI interviewer with voice — completely hands-free</p>

      <div class="field-group">
        <label>Position / Job Role</label>
        <div class="role-chips" id="roleChips">
          <button class="role-chip selected" data-role="Software Engineer">💻 Software Engineer</button>
          <button class="role-chip" data-role="Product Manager">📊 Product Manager</button>
          <button class="role-chip" data-role="Data Scientist">🧪 Data Scientist</button>
          <button class="role-chip" data-role="UX Designer">🎨 UX Designer</button>
          <button class="role-chip" data-role="Marketing Manager">📈 Marketing</button>
          <button class="role-chip" data-role="Sales Executive">🤝 Sales</button>
        </div>
      </div>

      <div class="field-group">
        <label>Custom Role (optional)</label>
        <input class="field-input" type="text" id="customRole" placeholder="e.g., DevOps Engineer at Google">
      </div>

      <div class="field-group">
        <label>Difficulty</label>
        <select class="field-input" id="difficultySelect">
          <option value="beginner">🟢 Beginner — Friendly & Encouraging</option>
          <option value="intermediate" selected>🟡 Intermediate — Standard Interview</option>
          <option value="advanced">🔴 Advanced — Tough, Senior-Level</option>
          <option value="faang">⚫ FAANG — Elite, High Pressure</option>
        </select>
      </div>

      <button class="start-btn" onclick="startInterview()">🎙️ Start Interview</button>
    </div>
  </div>

  <!-- ===== INTERVIEW SCREEN ===== -->
  <div class="interview-screen" id="interviewScreen">

    <!-- Interviewer Bar -->
    <div class="interviewer-bar">
      <div class="interviewer-avatar">👔</div>
      <div class="interviewer-info">
        <div class="interviewer-name">Zelvora Interviewer</div>
        <div class="interviewer-role" id="intJobLabel">Software Engineer Interview</div>
      </div>
      <div class="interview-meta">
        <div class="meta-badge question" id="questionBadge">Q 1/10</div>
        <div class="meta-badge time" id="timeBadge">00:00</div>
      </div>
    </div>

    <!-- Voice Select -->
    <div class="voice-sel" id="intVoiceSelector">
      <span style="font-size:11px;color:var(--text-dim)">Voice:</span>
    </div>

    <!-- Status -->
    <div class="int-status">
      <div class="dot" id="intDot"></div>
      <span id="intStatusText">Ready</span>
    </div>

    <!-- Orb -->
    <div class="int-orb-wrap">
      <div class="int-orb" id="intOrb" onclick="toggleInterview()">
        <span id="intOrbIcon">🎙️</span>
      </div>
      <div class="int-orb-label" id="intOrbLabel">Tap to respond</div>
    </div>

    <!-- Wave -->
    <div class="wave-bar-wrap" id="intWave">
      <div class="b"></div><div class="b"></div><div class="b"></div>
      <div class="b"></div><div class="b"></div><div class="b"></div><div class="b"></div>
    </div>

    <!-- Live Transcript -->
    <div class="live-t" id="intLiveT">...</div>

    <!-- Chat -->
    <div class="int-chat" id="intChat"></div>

    <!-- Controls -->
    <div class="int-controls">
      <button class="int-btn" id="intAutoBtn" onclick="toggleIntAuto()">🔄 Auto: ON</button>
      <button class="int-btn" onclick="skipQuestion()">⏭️ Skip</button>
      <button class="int-btn end" onclick="endInterview()">🏁 End Interview</button>
    </div>
  </div>

</div>

<!-- SCORE OVERLAY -->
<div class="score-overlay" id="scoreOverlay">
  <div class="score-card">
    <h2>📋 Interview Complete</h2>
    <p style="color:var(--text-secondary);font-size:13px;margin-bottom:4px" id="scoreRole"></p>

    <div class="score-ring">
      <svg viewBox="0 0 100 100">
        <circle class="bg" cx="50" cy="50" r="42"></circle>
        <circle class="fg" id="scoreCircle" cx="50" cy="50" r="42"
                stroke-dasharray="264" stroke-dashoffset="264"></circle>
      </svg>
      <div class="val" id="scoreVal">0</div>
    </div>

    <div class="score-metrics">
      <div class="score-metric">
        <div class="label">Questions</div>
        <div class="value" id="scoreQuestions">0</div>
      </div>
      <div class="score-metric">
        <div class="label">Duration</div>
        <div class="value" id="scoreDuration">0:00</div>
      </div>
      <div class="score-metric">
        <div class="label">Avg Response</div>
        <div class="value" id="scoreAvgLen">0 words</div>
      </div>
      <div class="score-metric">
        <div class="label">Difficulty</div>
        <div class="value" id="scoreDiff">—</div>
      </div>
    </div>

    <div class="score-feedback" id="scoreFeedback"></div>

    <button class="score-close" onclick="closeScore()">Done</button>
  </div>
</div>

<script>
/* ============================================================
   ZELVORA MOCK INTERVIEW ENGINE
   ============================================================ */

const API_URL = "https://your-worker.your-subdomain.workers.dev"; // ← UPDATE

// ===== STATE =====
let iv = {
  active: false,
  phase: "idle",
  history: [],
  jobRole: "Software Engineer",
  difficulty: "intermediate",
  questionNum: 0,
  maxQuestions: 10,
  autoListen: true,
  token: null,
  selectedVoice: null,
  startTime: null,
  timerInterval: null,
  userWordCounts: [],
};

// ===== DOM =====
const $ = id => document.getElementById(id);

// ===== TOKEN =====
function initToken() {
  const stored = localStorage.getItem("zelvora_token");
  if (stored) {
    try {
      const p = JSON.parse(atob(stored));
      if (Date.now() < p.exp) { iv.token = stored; return; }
    } catch(e) {}
  }
  const demo = { sub: "demo_" + Date.now(), exp: Date.now() + 30*24*60*60*1000, uses: { spoken: 500 } };
  iv.token = btoa(JSON.stringify(demo));
  localStorage.setItem("zelvora_token", iv.token);
}

// ===== ROLE CHIPS =====
document.querySelectorAll(".role-chip").forEach(chip => {
  chip.onclick = () => {
    document.querySelectorAll(".role-chip").forEach(c => c.classList.remove("selected"));
    chip.classList.add("selected");
  };
});

// ===== SPEECH RECOGNITION =====
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null;

function setupRec() {
  if (!SR) return false;
  rec = new SR();
  rec.continuous = true;
  rec.interimResults = true;
  rec.lang = "en-US";

  let final = "";
  let sTimer = null;

  rec.onstart = () => {
    setIntPhase("listening");
    final = "";
    $("intLiveT").textContent = "Listening...";
  };

  rec.onresult = (e) => {
    let interim = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t + " ";
      else interim = t;
    }
    $("intLiveT").textContent = final + interim;
    clearTimeout(sTimer);
    sTimer = setTimeout(() => {
      if (final.trim().length > 2) rec.stop();
    }, 4000);
  };

  rec.onend = () => {
    clearTimeout(sTimer);
    if (iv.phase === "listening" && final.trim().length > 2) {
      processAnswer(final.trim());
    } else if (iv.active && iv.phase === "listening") {
      startRec();
    }
  };

  rec.onerror = (e) => {
    if (e.error === "no-speech" && iv.active) setTimeout(() => startRec(), 500);
  };

  return true;
}

function startRec() {
  if (!rec || iv.phase === "speaking" || iv.phase === "thinking") return;
  try { rec.start(); } catch(e) {}
}

function stopRec() {
  if (rec) try { rec.stop(); } catch(e) {}
}

// ===== TTS =====
async function getVoices() {
  return new Promise(r => {
    const v = speechSynthesis.getVoices();
    if (v.length) return r(v);
    speechSynthesis.onvoiceschanged = () => r(speechSynthesis.getVoices());
    setTimeout(() => r(speechSynthesis.getVoices()), 1000);
  });
}

async function populateVoices() {
  const voices = await getVoices();
  const sel = $("intVoiceSelector");

  // Prefer deeper/professional voices for interviewer
  const preferred = voices.filter(v =>
    v.lang.startsWith("en") && (
      v.name.includes("Daniel") || v.name.includes("David") ||
      v.name.includes("Mark") || v.name.includes("Google") ||
      v.name.includes("Natural") || v.name.includes("Microsoft") ||
      v.name.includes("Rishi") || v.name.includes("Alex")
    )
  );

  const list = preferred.length > 0 ? preferred.slice(0,5) : voices.filter(v => v.lang.startsWith("en")).slice(0,5);

  list.forEach((v, i) => {
    const chip = document.createElement("button");
    chip.className = "v-chip" + (i === 0 ? " sel" : "");
    chip.textContent = v.name.replace(/Microsoft |Google |Apple /g,"").split(" ")[0];
    chip.onclick = () => {
      document.querySelectorAll(".v-chip").forEach(c => c.classList.remove("sel"));
      chip.classList.add("sel");
      iv.selectedVoice = v;
    };
    sel.appendChild(chip);
    if (i === 0) iv.selectedVoice = v;
  });

  if (list.length === 0) iv.selectedVoice = voices.find(v => v.lang.startsWith("en")) || voices[0];
}

function speak(text) {
  return new Promise(resolve => {
    speechSynthesis.cancel();
    setIntPhase("speaking");

    if (text.length > 200) {
      const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
      let i = 0;
      function next() {
        if (i >= sentences.length) { setIntPhase("idle"); resolve(); return; }
        const u = new SpeechSynthesisUtterance(sentences[i].trim());
        u.voice = iv.selectedVoice;
        u.rate = 0.92; u.pitch = 0.95; u.volume = 1;
        u.onend = () => { i++; next(); };
        u.onerror = () => { i++; next(); };
        speechSynthesis.speak(u);
      }
      next();
    } else {
      const u = new SpeechSynthesisUtterance(text);
      u.voice = iv.selectedVoice;
      u.rate = 0.92; u.pitch = 0.95; u.volume = 1;
      u.onend = () => { setIntPhase("idle"); resolve(); };
      u.onerror = () => { setIntPhase("idle"); resolve(); };
      speechSynthesis.speak(u);
    }
  });
}

// ===== AI =====
async function callIntAI(text, isStart = false) {
  setIntPhase("thinking");

  const res = await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${iv.token}`
    },
    body: JSON.stringify({
      text: isStart ? "__start_interview__" : text,
      history: iv.history.slice(-20),
      mode: "interview",
      job_role: iv.jobRole,
      difficulty: iv.difficulty,
    })
  });

  const data = await res.json();
  if (data.error) throw new Error(data.error);

  if (data.token) {
    iv.token = data.token;
    localStorage.setItem("zelvora_token", data.token);
  }

  return data.reply;
}

// ===== INTERVIEW FLOW =====
async function startInterview() {
  // Get settings
  const selectedChip = document.querySelector(".role-chip.selected");
  iv.jobRole = $("customRole").value.trim() || (selectedChip ? selectedChip.dataset.role : "Software Engineer");
  iv.difficulty = $("difficultySelect").value;
  iv.history = [];
  iv.questionNum = 1;
  iv.userWordCounts = [];

  $("intJobLabel").textContent = `${iv.jobRole} — ${iv.difficulty.charAt(0).toUpperCase() + iv.difficulty.slice(1)}`;
  $("questionBadge").textContent = `Q 1/${iv.maxQuestions}`;

  // Switch screens
  $("setupScreen").classList.add("hidden");
  $("interviewScreen").classList.add("active");

  // Setup
  if (!setupRec()) { alert("Browser not supported. Use Chrome."); return; }
  iv.active = true;

  // Timer
  iv.startTime = Date.now();
  iv.timerInterval = setInterval(updateTimer, 1000);

  // Get first question from AI
  try {
    const greeting = await callIntAI("", true);
    addIntMsg("interviewer", greeting);
    iv.history.push({ role: "assistant", content: greeting });

    await speak(greeting);

    if (iv.active && iv.autoListen) {
      setTimeout(() => startRec(), 500);
    }
  } catch(e) {
    addIntMsg("interviewer", "Hello! Let's begin. Tell me about yourself.");
    iv.history.push({ role: "assistant", content: "Hello! Let's begin. Tell me about yourself." });
    await speak("Hello! Let's begin. Tell me about yourself.");
    if (iv.active && iv.autoListen) setTimeout(() => startRec(), 500);
  }
}

async function processAnswer(text) {
  addIntMsg("candidate", text);
  iv.history.push({ role: "user", content: text });
  iv.userWordCounts.push(text.split(/\s+/).length);
  $("intLiveT").textContent = "";

  iv.questionNum++;
  $("questionBadge").textContent = `Q ${Math.min(iv.questionNum, iv.maxQuestions)}/${iv.maxQuestions}`;

  if (iv.questionNum > iv.maxQuestions) {
    await endInterview();
    return;
  }

  try {
    const reply = await callIntAI(text);
    addIntMsg("interviewer", reply);
    iv.history.push({ role: "assistant", content: reply });

    await speak(reply);

    if (iv.active && iv.autoListen) {
      setTimeout(() => startRec(), 400);
    }
  } catch(e) {
    addIntMsg("interviewer", "Interesting. Can you elaborate on that?");
    await speak("Interesting. Can you elaborate on that?");
    if (iv.active && iv.autoListen) setTimeout(() => startRec(), 400);
  }
}

function toggleInterview() {
  if (iv.phase === "listening") {
    stopRec();
  } else if (iv.phase === "idle" && iv.active) {
    startRec();
  }
}

function skipQuestion() {
  stopRec();
  processAnswer("I'd like to skip this question and move to the next one.");
}

async function endInterview() {
  iv.active = false;
  stopRec();
  speechSynthesis.cancel();
  clearInterval(iv.timerInterval);
  setIntPhase("idle");

  // Calculate score
  const duration = Math.floor((Date.now() - iv.startTime) / 1000);
  const avgWords = iv.userWordCounts.length > 0
    ? Math.round(iv.userWordCounts.reduce((a,b) => a+b, 0) / iv.userWordCounts.length) : 0;

  // Simple scoring heuristic
  let score = 50;
  score += Math.min(iv.questionNum - 1, 10) * 3; // Up to 30 for answering questions
  score += Math.min(avgWords, 50) * 0.3; // Up to 15 for detailed answers
  score += duration > 120 ? 5 : 0; // Bonus for longer sessions
  score = Math.min(Math.round(score), 100);

  // Get AI feedback
  let feedback = "Great effort! Keep practicing to improve your interview skills.";
  try {
    const fbReply = await callIntAI(
      "The interview is over. Please give a brief overall assessment of the candidate's performance. " +
      "Cover: communication clarity, answer quality, confidence, and areas for improvement. " +
      "Be specific and constructive. 4-5 sentences max."
    );
    feedback = fbReply;
  } catch(e) {}

  // Show score
  showScore({
    score,
    questions: iv.questionNum - 1,
    duration: formatTime(duration),
    avgWords: avgWords + " words",
    difficulty: iv.difficulty,
    role: iv.jobRole,
    feedback,
  });
}

function showScore(data) {
  $("scoreRole").textContent = data.role + " — " + data.difficulty;
  $("scoreQuestions").textContent = data.questions;
  $("scoreDuration").textContent = data.duration;
  $("scoreAvgLen").textContent = data.avgWords;
  $("scoreDiff").textContent = data.difficulty.charAt(0).toUpperCase() + data.difficulty.slice(1);
  $("scoreFeedback").textContent = data.feedback;
  $("scoreVal").textContent = data.score;

  // Animate ring
  const circumference = 264;
  const offset = circumference - (data.score / 100) * circumference;
  $("scoreCircle").style.strokeDashoffset = circumference;
  $("scoreOverlay").classList.add("open");

  setTimeout(() => {
    $("scoreCircle").style.strokeDashoffset = offset;
  }, 300);
}

function closeScore() {
  $("scoreOverlay").classList.remove("open");
  // Back to setup
  $("setupScreen").classList.remove("hidden");
  $("interviewScreen").classList.remove("active");
  $("intChat").innerHTML = "";
  iv.history = [];
  iv.questionNum = 0;
}

// ===== UI =====
function setIntPhase(phase) {
  iv.phase = phase;
  const orb = $("intOrb");
  orb.className = "int-orb " + phase;
  const wave = $("intWave");
  wave.classList.toggle("active", phase === "listening" || phase === "speaking");

  const icons = { idle: "🎙️", listening: "👂", thinking: "🧠", speaking: "🗣️" };
  const labels = { idle: "Tap to respond", listening: "Listening...", thinking: "Processing...", speaking: "Interviewer speaking" };
  const statuses = { idle: "Ready", listening: "Your turn", thinking: "Processing", speaking: "Interviewer" };
  const dotClass = { idle: "", listening: "listening", thinking: "thinking", speaking: "speaking" };

  $("intOrbIcon").textContent = icons[phase] || "🎙️";
  $("intOrbLabel").textContent = labels[phase] || "";
  $("intStatusText").textContent = statuses[phase] || "";
  $("intDot").className = "dot " + (dotClass[phase] || "");
}

function addIntMsg(type, text) {
  const div = document.createElement("div");
  div.className = `int-msg ${type}`;
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const label = type === "interviewer" ? "👔 Interviewer" : "🎤 You";
  div.innerHTML = `${text}<span class="ts">${label} · ${time}</span>`;
  $("intChat").appendChild(div);
  $("intChat").scrollTop = $("intChat").scrollHeight;
}

function updateTimer() {
  const elapsed = Math.floor((Date.now() - iv.startTime) / 1000);
  $("timeBadge").textContent = formatTime(elapsed);
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function toggleIntAuto() {
  iv.autoListen = !iv.autoListen;
  $("intAutoBtn").textContent = `🔄 Auto: ${iv.autoListen ? "ON" : "OFF"}`;
}

// ===== INIT =====
initToken();
populateVoices();

setInterval(() => {
  if (iv.phase === "speaking") speechSynthesis.resume();
}, 5000);
</script>
